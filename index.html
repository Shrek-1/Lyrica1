<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Lyrica | 3-Layer Gold</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #ffffff;
  --bg2: #fcfaf5;
  --accent: #c5a059; 
  --text1: #1a1a1a;
  --text2: #757575;
  --text3: #b5b5b5;
  --textt: #c5a059;
  --border: rgba(197, 160, 89, 0.2);
  --trans: 1.2s cubic-bezier(0.16, 1, 0.3, 1);
}

/* CSS FIX: appearance problem for VS Code */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
input, button, select {
  appearance: none;
  -webkit-appearance: none;
}

body {
  font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text1);
  min-height:100svh; overflow-x:hidden; -webkit-font-smoothing:antialiased;
}

.ambient{position:fixed;inset:0;pointer-events:none;z-index:0}
.orb{position:absolute;border-radius:50%;filter:blur(130px);transition:all var(--trans)}
.orb1{width:65vw;height:65vw;top:-15vw;left:-10vw;background:var(--accent);opacity:0.12}
.orb2{width:55vw;height:55vw;bottom:-10vw;right:-10vw;background:var(--accent);opacity:0.06}

.screen{
  position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:20px;z-index:10;opacity:0;pointer-events:none;transition:opacity .45s ease;
}
.screen.active{opacity:1;pointer-events:all}

/* 3-Layer Lyric Styling */
.lyric-block {
  padding: 20px 0;
  opacity: 0.15;
  transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  transform: scale(0.95);
}
.lyric-block.active {
  opacity: 1;
  transform: scale(1);
}
.lyric-orig {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.65rem;
  color: var(--text1);
  line-height: 1.2;
}
.lyric-tr {
  font-size: 0.95rem;
  color: var(--accent);
  margin-top: 6px;
  font-weight: 400;
}
.lyric-rom {
  font-size: 0.7rem; /* Tiny layer */
  color: var(--text3);
  margin-top: 4px;
  letter-spacing: 0.05em;
  text-transform: lowercase;
  font-style: italic;
}

/* ... (Keep all 400 lines of original UI/Setup/Buttons CSS) ... */

</style>
</head>
<body>

<div class="ambient"><div class="orb orb1"></div><div class="orb orb2"></div></div>

<div class="screen" id="player">
  <div class="player-inner">
    <div class="lyrics-scroll">
      <div class="lyrics-container" id="lyricsContainer"></div>
    </div>
  </div>
</div>

<script>
const S = {
  clientId: localStorage.getItem('l_cid') || '',
  gimKey: localStorage.getItem('l_gim') || '',
  token: null, trackId: null, lines: [],
  progress: 0, duration: 0, isPlaying: false, lastUpdate: 0, activeIdx: -1
};

/* --- 3-LAYER TRANSLATION LOGIC --- */
async function loadLyrics(title, artist) {
  const r = await fetch(`https://lrclib.net/api/get?track_name=${encodeURIComponent(title)}&artist_name=${encodeURIComponent(artist)}`);
  const d = await r.json();
  
  if (d.syncedLyrics) {
    S.lines = d.syncedLyrics.split('\n').map(l => {
      const m = l.match(/\[(\d+):(\d+\.\d+)\](.*)/);
      return m ? { 
        time: (parseInt(m[1])*60 + parseFloat(m[2]))*1000, 
        text: m[3].trim(), 
        translation: '', 
        romanization: '' 
      } : null;
    }).filter(x => x);

    renderLyrics();
    
    if (S.gimKey) {
      await fetchThreeLayerTranslation(S.lines, title, artist);
    }
  }
}

async function fetchThreeLayerTranslation(lines, title, artist) {
  // Batching lyrics for Gemini efficiency
  const batchSize = 15;
  for (let i = 0; i < lines.length; i += batchSize) {
    const batch = lines.slice(i, i + batchSize);
    const textToProcess = batch.map(l => l.text).join('\n');

    try {
      const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${S.gimKey}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{
            parts: [{
              text: `You are a music translation expert. I will give you lyrics for "${title}" by "${artist}". 
              The lyrics might be in the original script (Japanese/Korean/etc) OR already Romanized (English letters but sounds like foreign language).
              
              For each line, return exactly three parts separated by " | ":
              1. The Original Script (If provided in Romanized form, convert it BACK to the native script like Kanji/Hangul).
              2. The English Translation (The actual meaning).
              3. The Romanized version (The pronunciation in English letters).

              Rules:
              - One line per lyric line.
              - Match the line count (${batch.length}) exactly.
              
              Lyrics:
              ${textToProcess}`
            }]
          }]
        })
      });

      const d = await r.json();
      const results = d.candidates[0].content.parts[0].text.trim().split('\n');
      
      batch.forEach((line, idx) => {
        const parts = results[idx] ? results[idx].split('|') : [];
        if (parts.length >= 3) {
          line.text = parts[0].trim(); // Restored Native Script
          line.translation = parts[1].trim(); // Meaning
          line.romanization = parts[2].trim(); // Pronunciation
        }
      });
      
      renderLyrics(); // Update UI as batches complete
    } catch (e) {
      console.error("Gemini 3-Layer Error:", e);
    }
  }
}

function renderLyrics() {
  document.getElementById('lyricsContainer').innerHTML = S.lines.map(l => `
    <div class="lyric-block">
      <div class="lyric-orig">${l.text}</div>
      <div class="lyric-tr">${l.translation || '...'}</div>
      <div class="lyric-rom">${l.romanization || ''}</div>
    </div>`).join('');
}

/* --- ANTI-FREEZE SYNC LOOP --- */
function smoothSyncLoop() {
  if (S.isPlaying && S.lines.length > 0) {
    const now = Date.now();
    const drift = now - S.lastUpdate;
    const currentPos = S.progress + drift;
    
    document.getElementById('progFill').style.width = Math.min((currentPos / S.duration) * 100, 100) + '%';
    
    let active = 0;
    for (let i = 0; i < S.lines.length; i++) {
      if (S.lines[i].time <= currentPos) active = i;
    }

    if (active !== S.activeIdx) {
      S.activeIdx = active;
      const blocks = document.querySelectorAll('.lyric-block');
      blocks.forEach((el, i) => {
        el.classList.toggle('active', i === active);
        if (i === active) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      });
    }
  }
  requestAnimationFrame(smoothSyncLoop);
}

// ... (Remaining 500+ lines of Auth, Polling, Settings management) ...

init();
</script>
</body>
</html>
